# Global Settings
url: 'https://Mike-BBTHub.github.io'
avatar: 'https://github.com/Mike-BBTHub.png'
name: 'Babatunde Ojo'
timezone: 'Africa/Lagos'
bio: 'Team Lead, IT Risk Management & Cybersecurity | Lead Penetration Tester | Certified Cybersecurity Trainer'

# SEO Settings
title: 'Babatunde Ojo'
tagline: 'Cybersecurity, IT Risk Management & VAPT Insights'
description: 'Professional blog tracking advanced penetration testing methodologies, defensive security, GRC frameworks, and infrastructure security strategies.'

# GitHub Integration
github:
  username: Mike-BBTHub

# Social Links Configuration
social:
  name: 'Babatunde Ojo'
  email: 'mikebabatundeojo@gmail.com'
  links:
    - https://www.linkedin.com/in/babatunde-ojo-
    - https://github.com/Mike-BBTHub

# Core Architecture Settings
theme: jekyll-theme-chirpy
lang: en
toc: true
paginate: 10
baseurl: ""

# Webmaster & Analytics (Leave empty unless explicitly configuring)
webmaster_verifications:
  google: 
  bing: 
  alexa: 
  yandex: 
  baidu: 
  facebook: 

analytics:
  google:
    id: 
  goatcounter:
    id: 
  umami:
    id: 
    domain: 
  matomo:
    id: 
    domain: 
  cloudflare:
    id: 
  fathom:
    id: 

pageviews:
  provider: 

theme_mode: 
cdn:
social_preview_image: 

comments:
  provider: 

assets:
  self_host:
    enabled: 

pwa:
  enabled: true
  cache:
    enabled: true

# Advanced Layout Parameters (Do Not Modify)
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: 
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" 
      type: posts
    values:
      layout: post
      comments: true 
      toc: true 
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs 
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
